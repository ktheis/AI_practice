<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melody Transcriber</title>
<script src="https://cdn.jsdelivr.net/npm/abcjs@6.4.4/dist/abcjs-basic-min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Mono:wght@400;500&family=Source+Sans+3:wght@300;400;500;600&display=swap');

  :root {
    --bg: #FAF8F5;
    --bg-card: #FFFFFF;
    --text: #1A1A1A;
    --text-muted: #6B6560;
    --accent: #C44B2B;
    --accent-glow: #E8704F;
    --accent-soft: #FCEEE9;
    --border: #E6E0DA;
    --success: #3A8A5C;
    --success-soft: #E8F5ED;
    --beat-ring: #C44B2B;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 1.5rem;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 2rem;
    padding: 1.5rem 0 1rem;
  }

  .header-logo {
    height: 60px;
    width: auto;
    margin-bottom: 0.5rem;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 0.35rem;
  }

  header p {
    color: var(--text-muted);
    font-size: 0.95rem;
    font-weight: 300;
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
    box-shadow: var(--shadow);
  }

  .card-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    margin-bottom: 1rem;
  }

  .step-num {
    display: inline-block;
    width: 20px;
    height: 20px;
    line-height: 20px;
    text-align: center;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    font-size: 0.6rem;
    font-weight: 500;
    margin-right: 0.5rem;
    vertical-align: middle;
  }

  /* Settings row */
  .settings-row {
    display: flex;
    gap: 1rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .setting-group {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .setting-group label {
    font-size: 0.85rem;
    color: var(--text-muted);
    font-weight: 400;
  }

  select {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    padding: 0.35rem 0.6rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    outline: none;
  }

  select:focus { border-color: var(--accent); }

  /* Calibration */
  .calibrate-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-top: 0.75rem;
    padding-top: 0.75rem;
    border-top: 1px solid var(--border);
  }

  .cal-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    padding: 0.4rem 0.9rem;
    border: 1.5px solid var(--accent);
    border-radius: 6px;
    background: var(--bg);
    color: var(--accent);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .cal-btn:hover { background: var(--accent-soft); }

  .cal-btn.listening {
    background: var(--accent);
    color: white;
    animation: pulse-ring 1.5s ease infinite;
  }

  .cal-status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    color: var(--text-muted);
  }

  .cal-status .freq { color: var(--text); font-weight: 500; }
  .cal-status .ok { color: var(--success); }

  /* Tap tempo area */
  .tap-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  .tap-btn {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    background: var(--bg);
    color: var(--accent);
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.1s ease;
    position: relative;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  .tap-btn:active, .tap-btn.flash {
    background: var(--accent);
    color: white;
    transform: scale(0.96);
  }

  .tap-btn::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    transform: scale(1);
  }

  .tap-btn.flash::after {
    opacity: 0.4;
    transform: scale(1.1);
  }

  .tempo-display {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.8rem;
    font-weight: 500;
    color: var(--text);
    min-width: 120px;
    text-align: center;
  }

  .tempo-display small {
    font-size: 0.65rem;
    color: var(--text-muted);
    font-weight: 400;
    display: block;
    margin-top: 0.15rem;
    letter-spacing: 0.06em;
  }

  .or-clap {
    font-size: 0.78rem;
    color: var(--text-muted);
    font-style: italic;
  }

  /* Record button */
  .record-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  .record-btn {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    background: var(--bg);
    cursor: pointer;
    position: relative;
    transition: all 0.2s ease;
  }

  .record-btn::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 28px;
    height: 28px;
    background: var(--accent);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: all 0.2s ease;
  }

  .record-btn.recording {
    border-color: var(--accent-glow);
    animation: pulse-ring 1.5s ease infinite;
  }

  .record-btn.recording::after {
    border-radius: 4px;
    width: 22px;
    height: 22px;
    background: var(--accent-glow);
  }

  @keyframes pulse-ring {
    0%, 100% { box-shadow: 0 0 0 0 rgba(196,75,43,0.3); }
    50% { box-shadow: 0 0 0 10px rgba(196,75,43,0); }
  }

  .record-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .record-label {
    font-size: 0.85rem;
    color: var(--text-muted);
  }

  .record-label.active { color: var(--accent); font-weight: 500; }

  /* Metronome */
  .metronome {
    display: flex;
    gap: 0.75rem;
    align-items: center;
    justify-content: center;
    height: 36px;
    margin-bottom: 0.25rem;
  }

  .met-dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--bg);
    transition: transform 0.08s ease;
    position: relative;
  }

  .met-dot.beat-one {
    width: 24px;
    height: 24px;
    border-width: 2.5px;
  }

  .met-dot.active {
    background: var(--accent);
    border-color: var(--accent);
    transform: scale(1.25);
    box-shadow: 0 0 12px rgba(196,75,43,0.4);
  }

  .met-dot.beat-one.active {
    background: var(--accent);
    border-color: var(--accent);
    transform: scale(1.35);
    box-shadow: 0 0 18px rgba(196,75,43,0.5);
  }

  .met-dot.past {
    background: var(--accent-soft);
    border-color: var(--accent-soft);
  }

  .met-beat-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    color: var(--text-muted);
    position: absolute;
    bottom: -14px;
    left: 50%;
    transform: translateX(-50%);
  }

  .met-dot.active .met-beat-num {
    color: var(--accent);
    font-weight: 500;
  }

  /* Live pitch */
  .live-pitch {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.4rem;
    text-align: center;
    color: var(--text);
    min-height: 2.2rem;
    line-height: 2.2rem;
  }

  .live-pitch .hz {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-left: 0.3rem;
  }

  /* Score output */
  .score-area {
    min-height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  .score-area.has-score {
    display: block;
  }

  .score-area svg { width: 100%; }

  .abc-output {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.85rem 1rem;
    margin-top: 1rem;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--text);
    position: relative;
  }

  .copy-btn {
    position: absolute;
    top: 0.5rem;
    right: 0.5rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    padding: 0.25rem 0.5rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg-card);
    color: var(--text-muted);
    cursor: pointer;
  }

  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Status messages */
  .status {
    text-align: center;
    font-size: 0.82rem;
    color: var(--text-muted);
    padding: 0.5rem;
    min-height: 2rem;
  }

  .status.error { color: var(--accent); }
  .status.ok { color: var(--success); }

  /* Reset button */
  .reset-row {
    text-align: center;
    margin-top: 0.5rem;
  }

  .reset-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    padding: 0.4rem 1.2rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-card);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Responsive */
  @media (max-width: 500px) {
    body { padding: 1rem 0.75rem; }
    header h1 { font-size: 1.5rem; }
    .tap-btn { width: 110px; height: 110px; font-size: 0.9rem; }
  }
</style>
</head>

      </div>
      <div class="setting-group">
        <label>Clap detect</label>
        <select id="clapMode">
          <option value="button">Button tap</option>
          <option value="mic">Mic clap</option>
        </select>
      </div>
    </div>
    <div class="calibrate-row">
      <button class="cal-btn" id="calBtn">🎹 Calibrate</button>
      <span class="cal-status" id="calStatus">Play middle C to tune (default A=440)</span>
    </div>
  </div>

  <!-- Step 1: Tap tempo -->
  <div class="card">
    <div class="card-title"><span class="step-num">1</span> Set the beat</div>
    <div class="tap-area">
      <div class="tempo-display" id="tempoDisplay">— <small>BPM</small></div>
      <button class="tap-btn" id="tapBtn">TAP</button>
      <div class="or-clap" id="orClap">or switch to mic clap detection above</div>
    </div>
  </div>

  <!-- Step 2: Record melody -->
  <div class="card">
    <div class="card-title"><span class="step-num">2</span> Sing your melody</div>
    <div class="record-section">
      <div class="metronome" id="metronome"></div>
      <div class="live-pitch" id="livePitch"></div>
      <button class="record-btn" id="recordBtn" disabled></button>
      <div class="record-label" id="recordLabel">Set tempo first</div>
    </div>
  </div>

  <!-- Step 3: Score -->
  <div class="card">
    <div class="card-title"><span class="step-num">3</span> Score</div>
    <div class="score-area" id="scoreArea">Waiting for melody…</div>
    <div class="abc-output" id="abcOutput" style="display:none">
      <button class="copy-btn" id="copyBtn">COPY</button>
    </div>
  </div>

  <div class="status" id="status"></div>
  <div class="reset-row">
    <button class="reset-btn" id="resetBtn">↻ Start over</button>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────
const state = {
  tapTimes: [],
  bpm: 0,
  beatMs: 0,
  recording: false,
  audioCtx: null,
  analyser: null,
  micStream: null,
  detectedNotes: [],  // {freq, startTime, endTime}
  currentNote: null,
  recordStartTime: 0,
  rafId: null,
  clapMode: 'button',
  metInterval: null,
  metBeat: 0,
  a4Freq: 440, // tuning reference, adjusted by calibration
};

// ─── Elements ────────────────────────────────────────────────────────
const tapBtn = document.getElementById('tapBtn');
const tempoDisplay = document.getElementById('tempoDisplay');
const recordBtn = document.getElementById('recordBtn');
const recordLabel = document.getElementById('recordLabel');
const livePitch = document.getElementById('livePitch');
const scoreArea = document.getElementById('scoreArea');
const abcOutput = document.getElementById('abcOutput');
const copyBtn = document.getElementById('copyBtn');
const statusEl = document.getElementById('status');
const resetBtn = document.getElementById('resetBtn');
const timeSigSel = document.getElementById('timeSig');
const clapModeSel = document.getElementById('clapMode');
const orClap = document.getElementById('orClap');
const metronomeEl = document.getElementById('metronome');
const calBtn = document.getElementById('calBtn');
const calStatus = document.getElementById('calStatus');

// ─── Metronome ───────────────────────────────────────────────────────
function buildMetronomeDots() {
  const beatsPerBar = timeSigSel.value === '3/4' ? 3 : 4;
  metronomeEl.innerHTML = '';
  for (let i = 0; i < beatsPerBar; i++) {
    const dot = document.createElement('div');
    dot.className = 'met-dot' + (i === 0 ? ' beat-one' : '');
    const num = document.createElement('span');
    num.className = 'met-beat-num';
    num.textContent = i + 1;
    dot.appendChild(num);
    metronomeEl.appendChild(dot);
  }
}

function startMetronome() {
  const beatsPerBar = timeSigSel.value === '3/4' ? 3 : 4;
  buildMetronomeDots();
  state.metBeat = 0;
  tickMetronome(beatsPerBar);
  state.metInterval = setInterval(() => tickMetronome(beatsPerBar), state.beatMs);
}

function tickMetronome(beatsPerBar) {
  const dots = metronomeEl.querySelectorAll('.met-dot');
  dots.forEach((d, i) => {
    d.classList.remove('active', 'past');
    if (i < state.metBeat % beatsPerBar) d.classList.add('past');
  });
  const current = state.metBeat % beatsPerBar;
  if (dots[current]) dots[current].classList.add('active');
  state.metBeat++;
}

function stopMetronome() {
  if (state.metInterval) {
    clearInterval(state.metInterval);
    state.metInterval = null;
  }
  const dots = metronomeEl.querySelectorAll('.met-dot');
  dots.forEach(d => d.classList.remove('active', 'past'));
}

// ─── Calibration ─────────────────────────────────────────────────────
let calListening = false;
let calRafId = null;
let calSamples = [];

calBtn.addEventListener('click', async () => {
  if (calListening) {
    stopCalibration();
    return;
  }
  try {
    await ensureAudio();
  } catch (e) {
    calStatus.textContent = 'Mic access denied';
    return;
  }
  calListening = true;
  calSamples = [];
  calBtn.classList.add('listening');
  calBtn.textContent = '⏹ Stop';
  calStatus.innerHTML = 'Play and hold middle C…';
  calibrationLoop();
});

function calibrationLoop() {
  if (!calListening) return;
  // Use raw 440-based detection for calibration
  const origA4 = state.a4Freq;
  state.a4Freq = 440; // temporarily use standard for raw freq
  const freq = detectPitch(state.analyser, state.audioCtx.sampleRate);
  state.a4Freq = origA4;

  if (freq && freq > 200 && freq < 320) {
    // Plausible middle C range (should be ~261.6 Hz at A=440)
    calSamples.push(freq);
    const avg = calSamples.reduce((a, b) => a + b, 0) / calSamples.length;
    calStatus.innerHTML = `Hearing <span class="freq">${avg.toFixed(1)} Hz</span> (${calSamples.length} samples)`;
  }

  calRafId = requestAnimationFrame(calibrationLoop);
}

function stopCalibration() {
  calListening = false;
  if (calRafId) cancelAnimationFrame(calRafId);
  calBtn.classList.remove('listening');
  calBtn.textContent = '🎹 Calibrate';

  if (calSamples.length < 10) {
    calStatus.textContent = 'Not enough samples — try holding the note longer';
    return;
  }

  // Sort and take the middle 60% to filter outliers
  const sorted = [...calSamples].sort((a, b) => a - b);
  const trim = Math.floor(sorted.length * 0.2);
  const trimmed = sorted.slice(trim, sorted.length - trim);
  const avgC4 = trimmed.reduce((a, b) => a + b, 0) / trimmed.length;

  // Middle C at A=440 is 261.626 Hz
  // If their C4 is avgC4, then their A4 = avgC4 * (440 / 261.626)
  const newA4 = avgC4 * (440 / 261.626);
  state.a4Freq = newA4;

  calStatus.innerHTML = `<span class="ok">✓</span> Tuned: A = <span class="freq">${newA4.toFixed(1)} Hz</span> (C4 = ${avgC4.toFixed(1)} Hz)`;
}

// ─── Tap tempo ───────────────────────────────────────────────────────
function handleTap() {
  const now = performance.now();
  state.tapTimes.push(now);
  // Keep last 8 taps
  if (state.tapTimes.length > 8) state.tapTimes.shift();

  tapBtn.classList.add('flash');
  setTimeout(() => tapBtn.classList.remove('flash'), 120);

  if (state.tapTimes.length >= 2) {
    const intervals = [];
    for (let i = 1; i < state.tapTimes.length; i++) {
      intervals.push(state.tapTimes[i] - state.tapTimes[i - 1]);
    }
    const avgMs = intervals.reduce((a, b) => a + b, 0) / intervals.length;
    state.beatMs = avgMs;
    state.bpm = Math.round(60000 / avgMs);
    tempoDisplay.innerHTML = `${state.bpm} <small>BPM</small>`;
    recordBtn.disabled = false;
    recordLabel.textContent = 'Press to record';
    buildMetronomeDots();
  }

  // Reset if gap > 2.5 sec
  if (state.tapTimes.length >= 2) {
    const last2 = state.tapTimes.slice(-2);
    if (last2[1] - last2[0] > 2500) {
      state.tapTimes = [now];
    }
  }
}

tapBtn.addEventListener('mousedown', handleTap);
tapBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(); });

// ─── Clap mode toggle ───────────────────────────────────────────────
clapModeSel.addEventListener('change', () => {
  state.clapMode = clapModeSel.value;
  if (state.clapMode === 'mic') {
    tapBtn.textContent = '🎤';
    orClap.textContent = 'Clap loudly into your mic';
    startClapDetection();
  } else {
    tapBtn.textContent = 'TAP';
    orClap.textContent = 'or switch to mic clap detection above';
    stopClapDetection();
  }
});

let clapAnalyser = null;
let clapRaf = null;
let clapCooldown = false;

async function startClapDetection() {
  try {
    if (!state.audioCtx) state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (!state.micStream) {
      state.micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    }
    const source = state.audioCtx.createMediaStreamSource(state.micStream);
    clapAnalyser = state.audioCtx.createAnalyser();
    clapAnalyser.fftSize = 512;
    source.connect(clapAnalyser);
    detectClaps();
  } catch (e) {
    setStatus('Mic access denied', 'error');
  }
}

function stopClapDetection() {
  if (clapRaf) cancelAnimationFrame(clapRaf);
  clapRaf = null;
}

function detectClaps() {
  if (!clapAnalyser) return;
  const buf = new Uint8Array(clapAnalyser.fftSize);
  clapAnalyser.getByteTimeDomainData(buf);
  let maxAmp = 0;
  for (let i = 0; i < buf.length; i++) {
    const amp = Math.abs(buf[i] - 128);
    if (amp > maxAmp) maxAmp = amp;
  }
  // Threshold for clap detection
  if (maxAmp > 80 && !clapCooldown && !state.recording) {
    clapCooldown = true;
    handleTap();
    setTimeout(() => { clapCooldown = false; }, 200);
  }
  clapRaf = requestAnimationFrame(detectClaps);
}

// ─── Audio setup ─────────────────────────────────────────────────────
async function ensureAudio() {
  if (!state.audioCtx) {
    state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (state.audioCtx.state === 'suspended') await state.audioCtx.resume();
  if (!state.micStream) {
    state.micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  }
  const source = state.audioCtx.createMediaStreamSource(state.micStream);
  state.analyser = state.audioCtx.createAnalyser();
  state.analyser.fftSize = 4096;
  source.connect(state.analyser);
}

// ─── YIN pitch detection ─────────────────────────────────────────────
function detectPitch(analyser, sampleRate) {
  const bufLen = analyser.fftSize;
  const buf = new Float32Array(bufLen);
  analyser.getFloatTimeDomainData(buf);

  // Check RMS energy — if too quiet, return null
  let rms = 0;
  for (let i = 0; i < bufLen; i++) rms += buf[i] * buf[i];
  rms = Math.sqrt(rms / bufLen);
  if (rms < 0.015) return null;

  // YIN-like autocorrelation
  const halfLen = Math.floor(bufLen / 2);
  const yinBuf = new Float32Array(halfLen);

  // Difference function
  for (let tau = 0; tau < halfLen; tau++) {
    let sum = 0;
    for (let i = 0; i < halfLen; i++) {
      const diff = buf[i] - buf[i + tau];
      sum += diff * diff;
    }
    yinBuf[tau] = sum;
  }

  // Cumulative mean normalized difference
  yinBuf[0] = 1;
  let runningSum = 0;
  for (let tau = 1; tau < halfLen; tau++) {
    runningSum += yinBuf[tau];
    yinBuf[tau] = yinBuf[tau] * tau / runningSum;
  }

  // Absolute threshold (0.2 is a good default for YIN)
  const threshold = 0.2;
  let tauEstimate = -1;
  // Start from period corresponding to ~1500 Hz
  const minTau = Math.floor(sampleRate / 1500);
  const maxTau = Math.floor(sampleRate / 55); // down to ~55 Hz

  for (let tau = minTau; tau < Math.min(maxTau, halfLen); tau++) {
    if (yinBuf[tau] < threshold) {
      // Walk to the local minimum
      while (tau + 1 < halfLen && yinBuf[tau + 1] < yinBuf[tau]) tau++;
      tauEstimate = tau;
      break;
    }
  }

  if (tauEstimate === -1) return null;

  // Parabolic interpolation
  let betterTau = tauEstimate;
  if (tauEstimate > 0 && tauEstimate < halfLen - 1) {
    const s0 = yinBuf[tauEstimate - 1];
    const s1 = yinBuf[tauEstimate];
    const s2 = yinBuf[tauEstimate + 1];
    betterTau = tauEstimate + (s0 - s2) / (2 * (s0 - 2 * s1 + s2));
  }

  return sampleRate / betterTau;
}

// ─── Note name / MIDI helpers ────────────────────────────────────────
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

function freqToMidi(freq) {
  return 69 + 12 * Math.log2(freq / state.a4Freq);
}

function midiToNoteName(midi) {
  const noteIndex = ((Math.round(midi) % 12) + 12) % 12;
  const octave = Math.floor(Math.round(midi) / 12) - 1;
  return NOTE_NAMES[noteIndex] + octave;
}

function midiToAbc(midi, keySharps, keyFlats) {
  const m = Math.round(midi);
  const noteIndex = ((m % 12) + 12) % 12;
  const octave = Math.floor(m / 12) - 1;

  // Note indices: C=0, C#=1, D=2, D#=3, E=4, F=5, F#=6, G=7, G#=8, A=9, A#=10, B=11
  //
  // In ABC, key signature sharps/flats are implicit:
  //   K:G means F is always F# unless you write =F
  //   K:E means F,C,G,D are always sharp unless naturalized with =
  //   So "F" in K:E means F#, and "=F" means F natural
  //
  // Our keySharps set contains the MIDI indices of the sharped notes (e.g. 6 for F#)
  // Our keyFlats set contains the MIDI indices of the flatted notes (e.g. 10 for Bb)
  
  let noteName;
  
  // Map from sharp/flat note index to the letter it modifies
  // F#(6)->F(5), C#(1)->C(0), G#(8)->G(7), D#(3)->D(2), A#(10)->A(9), E#(5)->E(4), B#(0)->B(11)
  // Bb(10)->B(11), Eb(3)->E(4), Ab(8)->A(9), Db(1)->D(2), Gb(6)->G(7), Cb(11)->C(0), Fb(4)->F(5)
  
  const NATURAL_NAMES = ['C', '', 'D', '', 'E', 'F', '', 'G', '', 'A', '', 'B'];
  
  if (keySharps && keySharps.has(noteIndex)) {
    // This note IS a key-signature sharp — write the plain letter name
    // In ABC, "F" in K:G already means F#
    // sharp note index -> base letter: subtract 1
    const baseLetter = NATURAL_NAMES[(noteIndex - 1 + 12) % 12] 
                    || NATURAL_NAMES[(noteIndex - 2 + 12) % 12]; // fallback
    noteName = baseLetter;
  } else if (keyFlats && keyFlats.has(noteIndex)) {
    // This note IS a key-signature flat — write the plain letter name
    // In ABC, "B" in K:F already means Bb
    // flat note index -> base letter: add 1
    const baseLetter = NATURAL_NAMES[(noteIndex + 1) % 12]
                    || NATURAL_NAMES[(noteIndex + 2) % 12]; // fallback
    noteName = baseLetter;
  } else if (NATURAL_NAMES[noteIndex]) {
    // It's a natural note (white key) — but check if the key sig
    // would sharp or flat this letter, requiring a natural sign
    const letterName = NATURAL_NAMES[noteIndex];
    
    // Would this letter be sharped by the key sig?
    // e.g. in K:E, the letter F is sharped to F#(6), so plain F(5) needs '=F'
    const sharpedIndex = (noteIndex + 1) % 12;
    const flattedIndex = (noteIndex - 1 + 12) % 12;
    
    if (keySharps && keySharps.has(sharpedIndex)) {
      noteName = '=' + letterName; // natural cancels the key sig sharp
    } else if (keyFlats && keyFlats.has(flattedIndex)) {
      noteName = '=' + letterName; // natural cancels the key sig flat
    } else {
      noteName = letterName;
    }
  } else {
    // It's a chromatic note (black key) NOT in the key signature
    // Use explicit accidental
    // Prefer sharps for sharp keys, flats for flat keys
    if (keyFlats && keyFlats.size > 0) {
      // Flat key — write as flat: e.g. Bb = _B, Eb = _E
      const above = NATURAL_NAMES[(noteIndex + 1) % 12];
      noteName = above ? ('_' + above) : ('^' + NATURAL_NAMES[(noteIndex - 1 + 12) % 12]);
    } else {
      // Sharp key or C — write as sharp
      const below = NATURAL_NAMES[(noteIndex - 1 + 12) % 12];
      noteName = below ? ('^' + below) : ('_' + NATURAL_NAMES[(noteIndex + 1) % 12]);
    }
  }

  if (octave >= 5) {
    const prefix = noteName.match(/^[\^_=]*/)[0];
    const letter = noteName.slice(prefix.length);
    noteName = prefix + letter.toLowerCase();
    const extraOctaves = octave - 5;
    noteName += "'".repeat(extraOctaves);
  } else if (octave === 4) {
    // default register for ABC
  } else {
    const below = 4 - octave;
    noteName += ",".repeat(below);
  }

  return noteName;
}

// ─── Key detection (from tonic) ──────────────────────────────────────
// Returns {name, sharps, flats} where sharps/flats are Sets of MIDI note indices (0-11)
// that are raised/lowered by the key signature

// Sharps order: F C G D A E B
// Flats order: B E A D G C F
const KEY_SIGNATURES = {
  // Major keys
  'C':  { sharps: [], flats: [] },
  'G':  { sharps: [6], flats: [] },          // F#
  'D':  { sharps: [6, 1], flats: [] },       // F# C#
  'A':  { sharps: [6, 1, 8], flats: [] },    // F# C# G#
  'E':  { sharps: [6, 1, 8, 3], flats: [] }, // F# C# G# D#
  'B':  { sharps: [6, 1, 8, 3, 10], flats: [] }, // F# C# G# D# A#
  'F#': { sharps: [6, 1, 8, 3, 10, 5], flats: [] }, // + E#
  'C#': { sharps: [6, 1, 8, 3, 10, 5, 0], flats: [] }, // + B#
  'F':  { sharps: [], flats: [10] },          // Bb
  'Bb': { sharps: [], flats: [10, 3] },       // Bb Eb
  'Eb': { sharps: [], flats: [10, 3, 8] },    // Bb Eb Ab
  'Ab': { sharps: [], flats: [10, 3, 8, 1] }, // Bb Eb Ab Db
  'Db': { sharps: [], flats: [10, 3, 8, 1, 6] }, // + Gb
  'Gb': { sharps: [], flats: [10, 3, 8, 1, 6, 11] }, // + Cb
  // Minor keys (relative minors share the same key signature)
  'Am':  { sharps: [], flats: [] },
  'Em':  { sharps: [6], flats: [] },          // F#
  'Bm':  { sharps: [6, 1], flats: [] },       // F# C#
  'F#m': { sharps: [6, 1, 8], flats: [] },    // F# C# G#
  'C#m': { sharps: [6, 1, 8, 3], flats: [] }, // F# C# G# D#
  'G#m': { sharps: [6, 1, 8, 3, 10], flats: [] },
  'Dm':  { sharps: [], flats: [10] },          // Bb
  'Gm':  { sharps: [], flats: [10, 3] },       // Bb Eb
  'Cm':  { sharps: [], flats: [10, 3, 8] },    // Bb Eb Ab
  'Fm':  { sharps: [], flats: [10, 3, 8, 1] }, // Bb Eb Ab Db
  'Bbm': { sharps: [], flats: [10, 3, 8, 1, 6] },
  'Ebm': { sharps: [], flats: [10, 3, 8, 1, 6, 11] },
};

function inferKey(tonicMidi, allNotes) {
  const noteIndex = ((Math.round(tonicMidi) % 12) + 12) % 12;
  
  // Determine major vs minor by looking at the 3rd scale degree
  // Major 3rd = 4 semitones above tonic, Minor 3rd = 3 semitones
  const major3rd = (noteIndex + 4) % 12;
  const minor3rd = (noteIndex + 3) % 12;
  
  let major3count = 0;
  let minor3count = 0;
  
  if (allNotes) {
    for (const note of allNotes) {
      const ni = ((note.midi % 12) + 12) % 12;
      if (ni === major3rd) major3count++;
      if (ni === minor3rd) minor3count++;
    }
  }
  
  const isMinor = minor3count > major3count;
  
  const majorKeys = ['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'];
  const minorKeys = ['Cm','C#m','Dm','Ebm','Em','Fm','F#m','Gm','G#m','Am','Bbm','Bm'];
  
  const keyName = isMinor ? minorKeys[noteIndex] : majorKeys[noteIndex];
  const sig = KEY_SIGNATURES[keyName] || { sharps: [], flats: [] };
  return {
    name: keyName,
    sharps: new Set(sig.sharps),
    flats: new Set(sig.flats),
  };
}

// ─── Recording loop ──────────────────────────────────────────────────
// Energy tracking for onset detection
let prevRms = 0;
let rmsHistory = [];
const RMS_HISTORY_LEN = 5;

// Pitch stability tracking: confirm a new pitch over several frames
let candidateMidi = null;
let candidateCount = 0;
const CONFIRM_FRAMES_STEP = 2;  // stepwise motion (1-4 semitones)
const CONFIRM_FRAMES_LARGE = 5; // large jumps (5+ semitones)

// Re-attack detection: track energy dips for repeated same-pitch notes
let recentRmsMin = Infinity;  // minimum RMS since current note started
let recentRmsMax = 0;         // tracks current rising energy
let dipDetected = false;       // true once we've seen a significant dip

function getRms(analyser) {
  const buf = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buf);
  let sum = 0;
  for (let i = 0; i < buf.length; i++) sum += buf[i] * buf[i];
  return Math.sqrt(sum / buf.length);
}

function recordingLoop() {
  if (!state.recording) return;

  const freq = detectPitch(state.analyser, state.audioCtx.sampleRate);
  const now = performance.now();
  const elapsed = now - state.recordStartTime;

  // Track RMS energy for onset detection
  const rms = getRms(state.analyser);
  rmsHistory.push(rms);
  if (rmsHistory.length > RMS_HISTORY_LEN) rmsHistory.shift();
  const avgRms = rmsHistory.reduce((a, b) => a + b, 0) / rmsHistory.length;
  
  // Strong onset: big energy spike (loud key strike)
  const isStrongOnset = rms > 0.03 && rms > prevRms * 1.8 && rms > avgRms * 1.5;
  // Soft onset: smaller energy bump — catches softer keystrikes like ring finger
  // Requires pitch to also be different from current note
  const isSoftOnset = rms > 0.02 && rms > prevRms * 1.3 && rms > avgRms * 1.15;
  
  prevRms = rms;

  const silenceThreshold = 0.012;

  if (freq && freq > 60 && freq < 1500 && rms > silenceThreshold) {
    const midi = freqToMidi(freq);
    const rounded = Math.round(midi);
    const name = midiToNoteName(midi);
    livePitch.innerHTML = `${name} <span class="hz">${Math.round(freq)} Hz</span>`;

    if (state.currentNote) {
      // Use continuous (non-rounded) MIDI for finer same-note detection
      const continuousMidi = midi; // not rounded
      const continuousDiff = Math.abs(continuousMidi - state.currentNote.midi);
      const diff = Math.abs(rounded - state.currentNote.midi);
      
      // Octave jump detection: exactly ~12 semitones apart
      const isOctaveJump = (diff >= 11 && diff <= 13);
      // Harmonic jump: fifths (7 semitones) or other large intervals
      const isLargeJump = diff >= 5;
      
      if (continuousDiff < 0.6) {
        // Same pitch — but check for re-attack (repeated note)
        const noteAge = elapsed - state.currentNote.startTime;
        
        // Track energy envelope for re-attack detection
        if (noteAge > 80) { // don't check during initial attack
          if (rms < recentRmsMin) {
            recentRmsMin = rms;
          }
          // Detect dip: energy fell significantly from peak
          if (state.currentNote.peakRms > 0 && 
              recentRmsMin < state.currentNote.peakRms * 0.4) {
            dipDetected = true;
          }
          // Detect re-attack: energy rising again after a dip
          if (dipDetected && rms > recentRmsMin * 1.8 && rms > 0.02 && noteAge > 150) {
            // Re-attack detected — same pitch played again
            finalizeNote(state.currentNote);
            state.currentNote = {
              midi: rounded,
              freqSum: freq,
              freqCount: 1,
              startTime: elapsed,
              endTime: elapsed,
              peakRms: rms,
              _silenceStart: null,
            };
            recentRmsMin = Infinity;
            recentRmsMax = 0;
            dipDetected = false;
            candidateMidi = null;
            candidateCount = 0;
          } else {
            // No re-attack, just extend
            state.currentNote.endTime = elapsed;
            state.currentNote.freqSum += freq;
            state.currentNote.freqCount++;
            state.currentNote._silenceStart = null;
            candidateMidi = null;
            candidateCount = 0;
          }
        } else {
          // Still in initial attack phase, just extend
          state.currentNote.endTime = elapsed;
          state.currentNote.freqSum += freq;
          state.currentNote.freqCount++;
          state.currentNote._silenceStart = null;
          // Track peak energy during attack
          if (rms > state.currentNote.peakRms) {
            state.currentNote.peakRms = rms;
          }
        }
      } else if (isOctaveJump && !isStrongOnset) {
        // Octave jump without strong energy spike — harmonic
        candidateMidi = null;
        candidateCount = 0;
      } else if (isStrongOnset || (isSoftOnset && continuousDiff >= 0.6 && diff <= 4)) {
        // Energy spike + pitch change — accept new note immediately
        // Soft onset only accepted for stepwise motion (not large jumps)
        finalizeNote(state.currentNote);
        state.currentNote = {
          midi: rounded,
          freqSum: freq,
          freqCount: 1,
          startTime: elapsed,
          endTime: elapsed,
          peakRms: rms,
          _silenceStart: null,
        };
        recentRmsMin = Infinity;
        dipDetected = false;
        candidateMidi = null;
        candidateCount = 0;
      } else {
        // Pitch changed without energy spike — could be legato new note
        // or harmonic artifact. Use stability confirmation.
        if (isLargeJump && !isStrongOnset) {
          // Large non-octave jump without onset — likely harmonic, 
          // but still track as candidate in case it's real
          if (candidateMidi !== null && Math.abs(rounded - candidateMidi) <= 1) {
            candidateCount++;
          } else {
            candidateMidi = rounded;
            candidateCount = 1;
          }
          // Require more frames for large jumps
          if (candidateCount >= CONFIRM_FRAMES_LARGE) {
            finalizeNote(state.currentNote);
            state.currentNote = {
              midi: rounded,
              freqSum: freq,
              freqCount: 1,
              startTime: elapsed - (candidateCount * 16), // backdate
              endTime: elapsed,
              peakRms: rms,
              _silenceStart: null,
            };
            recentRmsMin = Infinity;
            dipDetected = false;
            candidateMidi = null;
            candidateCount = 0;
          }
        } else {
          // Small interval change (stepwise motion, 2-4 semitones)
          // Track candidate and confirm over a few frames
          if (candidateMidi !== null && Math.abs(rounded - candidateMidi) <= 1) {
            candidateCount++;
          } else {
            candidateMidi = rounded;
            candidateCount = 1;
          }
          if (candidateCount >= CONFIRM_FRAMES_STEP) {
            // Confirmed: new note via stable pitch change
            finalizeNote(state.currentNote);
            state.currentNote = {
              midi: candidateMidi,
              freqSum: freq,
              freqCount: 1,
              startTime: elapsed - (candidateCount * 16), // backdate slightly
              endTime: elapsed,
              peakRms: rms,
              _silenceStart: null,
            };
            recentRmsMin = Infinity;
            dipDetected = false;
            candidateMidi = null;
            candidateCount = 0;
          }
        }
      }
    } else {
      // First note or after silence
      state.currentNote = {
        midi: rounded,
        freqSum: freq,
        freqCount: 1,
        startTime: elapsed,
        endTime: elapsed,
        peakRms: rms,
        _silenceStart: null,
      };
      recentRmsMin = Infinity;
      dipDetected = false;
      candidateMidi = null;
      candidateCount = 0;
    }
  } else {
    // Silence or below threshold
    livePitch.innerHTML = `<span class="hz">—</span>`;
    candidateMidi = null;
    candidateCount = 0;
    if (state.currentNote) {
      if (!state.currentNote._silenceStart) {
        state.currentNote._silenceStart = elapsed;
      } else if (elapsed - state.currentNote._silenceStart > 150) {
        // Sustained silence — end the note
        state.currentNote.endTime = state.currentNote._silenceStart;
        finalizeNote(state.currentNote);
        state.currentNote = null;
      }
    }
  }

  state.rafId = requestAnimationFrame(recordingLoop);
}

function finalizeNote(note) {
  const duration = note.endTime - note.startTime;
  if (duration < 120) return; // filter out very short glitches
  const avgFreq = note.freqSum / note.freqCount;
  const avgMidi = freqToMidi(avgFreq);
  state.detectedNotes.push({
    midi: Math.round(avgMidi),
    startTime: note.startTime,
    endTime: note.endTime,
    durationMs: duration,
  });
}

// ─── Quantize & generate ABC ─────────────────────────────────────────
function quantizeAndGenerateABC() {
  const notes = state.detectedNotes;
  if (notes.length === 0) {
    setStatus('No notes detected — try again', 'error');
    return null;
  }

  const beatMs = state.beatMs;
  const timeSig = timeSigSel.value;
  const beatsPerBar = timeSig === '3/4' ? 3 : 4;

  // Determine the tonic from the first note
  const tonicMidi = notes[0].midi;
  const keyInfo = inferKey(tonicMidi, notes);
  const keyName = keyInfo.name;
  const keySharps = keyInfo.sharps;
  const keyFlats = keyInfo.flats;

  // Quantize durations to beat fractions: 0.5 = eighth, 1 = quarter, 1.5 = dotted quarter, 2 = half, 3 = dotted half
  const allowedBeatFracs = [0.5, 1, 1.5, 2, 3, 4];

  const quantized = [];
  for (const note of notes) {
    const beats = note.durationMs / beatMs;
    // Find closest allowed fraction
    let best = allowedBeatFracs[0];
    let bestDist = Math.abs(beats - best);
    for (const f of allowedBeatFracs) {
      const d = Math.abs(beats - f);
      if (d < bestDist) { bestDist = d; best = f; }
    }
    quantized.push({ midi: note.midi, beats: best });
  }

  // Also detect rests between notes
  const withRests = [];
  for (let i = 0; i < notes.length; i++) {
    if (i > 0) {
      const gap = notes[i].startTime - notes[i - 1].endTime;
      const gapBeats = gap / beatMs;
      if (gapBeats >= 0.35) {
        // Insert a rest
        let restBeats = allowedBeatFracs[0];
        let bestDist = Math.abs(gapBeats - restBeats);
        for (const f of allowedBeatFracs) {
          const d = Math.abs(gapBeats - f);
          if (d < bestDist) { bestDist = d; restBeats = f; }
        }
        withRests.push({ rest: true, beats: restBeats });
      }
    }
    withRests.push(quantized[i]);
  }

  // Build ABC string
  // Duration mapping: quarter note = 1 in ABC default (L:1/4)
  function beatToAbcDur(beats) {
    // With L:1/8, one unit = eighth note
    // quarter = 2, half = 4, eighth = 1, dotted quarter = 3, dotted half = 6, whole = 8
    const units = beats * 2; // convert quarter-note beats to eighth-note units
    if (units === 1) return '';
    if (units === 2) return '2';
    if (units === 3) return '3';
    if (units === 4) return '4';
    if (units === 6) return '6';
    if (units === 8) return '8';
    return String(Math.round(units));
  }

  let melody = '';
  let beatsInBar = 0;

  for (const item of withRests) {
    let token;
    if (item.rest) {
      token = 'z' + beatToAbcDur(item.beats);
    } else {
      const abcNote = midiToAbc(item.midi, keySharps, keyFlats);
      token = abcNote + beatToAbcDur(item.beats);
    }

    beatsInBar += item.beats;
    melody += token + ' ';

    if (beatsInBar >= beatsPerBar) {
      melody += '| ';
      beatsInBar = beatsInBar - beatsPerBar;
    }
  }

  // Trim trailing bar line if melody ends with one
  melody = melody.trim().replace(/\|\s*$/, '|]');
  if (!melody.endsWith('|]')) melody += ' |]';

  const abc = `X:1
T:Transcription
M:${timeSig}
L:1/8
Q:1/4=${state.bpm}
K:${keyName}
${melody}`;

  return abc;
}

// ─── Record toggle ───────────────────────────────────────────────────
recordBtn.addEventListener('click', async () => {
  if (!state.recording) {
    // Start
    try {
      await ensureAudio();
    } catch (e) {
      setStatus('Microphone access denied', 'error');
      return;
    }
    state.recording = true;
    state.detectedNotes = [];
    state.currentNote = null;
    state.recordStartTime = performance.now();
    prevRms = 0;
    rmsHistory = [];
    candidateMidi = null;
    candidateCount = 0;
    recentRmsMin = Infinity;
    dipDetected = false;
    recordBtn.classList.add('recording');
    recordLabel.textContent = 'Listening… press to stop';
    recordLabel.classList.add('active');
    setStatus('Sing your melody now — start on the tonic!', 'ok');
    startMetronome();
    recordingLoop();
  } else {
    // Stop
    state.recording = false;
    if (state.rafId) cancelAnimationFrame(state.rafId);
    recordBtn.classList.remove('recording');
    recordLabel.textContent = 'Press to record';
    recordLabel.classList.remove('active');
    livePitch.innerHTML = '';
    stopMetronome();

    // Finalize any hanging note
    if (state.currentNote) {
      state.currentNote.endTime = performance.now() - state.recordStartTime;
      finalizeNote(state.currentNote);
      state.currentNote = null;
    }

    setStatus('Processing…');
    // Small delay for UX
    setTimeout(() => {
      const abc = quantizeAndGenerateABC();
      if (abc) {
        renderScore(abc);
        setStatus(`Transcribed ${state.detectedNotes.length} notes`, 'ok');
      }
    }, 200);
  }
});

// ─── Render score ────────────────────────────────────────────────────
function renderScore(abc) {
  scoreArea.classList.add('has-score');
  scoreArea.innerHTML = '';
  const div = document.createElement('div');
  div.id = 'notation';
  scoreArea.appendChild(div);
  ABCJS.renderAbc('notation', abc, {
    responsive: 'resize',
    staffwidth: 680,
    paddingtop: 10,
    paddingbottom: 10,
  });

  abcOutput.style.display = 'block';
  abcOutput.textContent = abc;
  // Re-add copy button
  const btn = document.createElement('button');
  btn.className = 'copy-btn';
  btn.textContent = 'COPY';
  btn.onclick = () => {
    navigator.clipboard.writeText(abc).then(() => {
      btn.textContent = 'COPIED';
      setTimeout(() => { btn.textContent = 'COPY'; }, 1500);
    });
  };
  abcOutput.appendChild(btn);
}

// ─── Utilities ───────────────────────────────────────────────────────
function setStatus(msg, type) {
  statusEl.textContent = msg;
  statusEl.className = 'status' + (type ? ` ${type}` : '');
}

resetBtn.addEventListener('click', () => {
  state.tapTimes = [];
  state.bpm = 0;
  state.beatMs = 0;
  state.detectedNotes = [];
  state.currentNote = null;
  state.recording = false;
  if (state.rafId) cancelAnimationFrame(state.rafId);
  stopMetronome();
  metronomeEl.innerHTML = '';
  recordBtn.classList.remove('recording');
  recordBtn.disabled = true;
  recordLabel.textContent = 'Set tempo first';
  recordLabel.classList.remove('active');
  tempoDisplay.innerHTML = '— <small>BPM</small>';
  livePitch.innerHTML = '';
  scoreArea.classList.remove('has-score');
  scoreArea.innerHTML = 'Waiting for melody…';
  abcOutput.style.display = 'none';
  setStatus('');
});

timeSigSel.addEventListener('change', () => {
  if (state.bpm > 0) buildMetronomeDots();
});

// Keyboard shortcut: space bar for tap
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && !state.recording && document.activeElement.tagName !== 'SELECT') {
    e.preventDefault();
    handleTap();
  }
});
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Course Meeting Schedule Generator</title>
<style>
body{font-family:system-ui,sans-serif;background:#f5f4f0;padding:2rem 1rem}
.card{background:#fff;border:1px solid #ddd;border-radius:12px;max-width:760px;margin:0 auto;padding:1.5rem 2rem}
h1{font-size:17px;font-weight:500;margin-bottom:1.25rem}
.upload{border:1.5px dashed #ccc;border-radius:8px;padding:1.5rem;text-align:center;color:#888;font-size:14px;margin-bottom:1rem;cursor:pointer;transition:border-color .15s}
.upload:hover,.upload.over{border-color:#93c5fd;color:#1d4ed8}
.upload input{display:none}
.controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:.75rem}
select{font-size:14px;padding:5px 9px;border-radius:7px;border:1px solid #ccc;background:#fff;cursor:pointer}
.days{display:flex;gap:5px}
.day-btn{width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center;border:1px solid #ccc;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500;color:#666;user-select:none}
.day-btn.on{background:#dbeafe;color:#1d4ed8;border-color:#93c5fd}
button.dl{font-size:13px;padding:5px 13px;border-radius:7px;border:1px solid #ccc;background:#fff;cursor:pointer;margin-left:auto}
.wed{display:none;align-items:center;gap:8px;flex-wrap:wrap;padding:7px 11px;background:#fefce8;border:1px solid #fcd34d;border-radius:7px;margin-bottom:.75rem;font-size:13px;color:#92400e}
.tog{display:flex;border:1px solid #d1d5db;border-radius:7px;overflow:hidden}
.tog span{padding:4px 11px;cursor:pointer;background:#fff;color:#555;font-size:13px}
.tog span.on{background:#fef3c7;color:#92400e;font-weight:500}
.tog span:first-child{border-right:1px solid #d1d5db}
.stats{display:flex;gap:10px;margin-bottom:.75rem}
.stat{background:#f5f4f0;border-radius:7px;padding:8px 14px;text-align:center;min-width:75px}
.stat small{display:block;font-size:11px;color:#888}
.stat b{font-size:19px;font-weight:500}
.wrap{max-height:420px;overflow-y:auto;border:1px solid #e5e3dc;border-radius:8px}
table{width:100%;border-collapse:collapse;font-size:13px;font-family:monospace}
th{text-align:left;padding:5px 9px;font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #e5e3dc;background:#fafaf7;position:sticky;top:0}
td{padding:4px 9px;border-bottom:1px solid #f0efe9}
tr:last-child td{border-bottom:none}
tr.off td{color:#bbb}
tr.mon td.n{color:#1d4ed8}
.pill{display:inline-block;font-size:10px;font-weight:500;padding:1px 5px;border-radius:4px;background:#fef3c7;color:#92400e;margin-left:3px}
.pill.ad{background:#dbeafe;color:#1d4ed8}
.pill.w{background:#fee2e2;color:#991b1b}
.pill.inc{background:#dcfce7;color:#166534}
.hint{text-align:center;padding:2rem;color:#aaa;font-size:14px}
.err{color:#991b1b;font-size:13px;margin-bottom:.5rem}
</style>
</head>
<body>
<div class="card">
  <h1>Course Meeting Schedule Generator</h1>

  <div class="upload" id="dropzone" onclick="document.getElementById('fileIn').click()">
    <input type="file" id="fileIn" accept=".csv">
    <span id="uploadLabel">Drop academic calendar CSV here, or click to browse</span>
  </div>
  <div class="err" id="err"></div>

  <div id="main" style="display:none">
    <div class="controls">
      <select id="sem"></select>
      <div class="days">
        <div class="day-btn" data-d="1">M</div>
        <div class="day-btn" data-d="2">T</div>
        <div class="day-btn" data-d="3">W</div>
        <div class="day-btn" data-d="4">R</div>
        <div class="day-btn" data-d="5">F</div>
      </div>
      <button class="dl" onclick="dl()">Download CSV</button>
    </div>

    <div class="wed" id="wed">
      <span id="wedMsg"></span>
      <div class="tog">
        <span class="on" id="tBefore" onclick="setT('before')">before 12:30</span>
        <span id="tAfter" onclick="setT('after')">after 12:30</span>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><small>Meeting days</small><b id="sTotal">—</b></div>
      <div class="stat"><small>Class sessions</small><b id="sSess">—</b></div>
      <div class="stat"><small>No-instruction</small><b id="sMiss">—</b></div>
    </div>

    <div class="wrap" id="wrap" style="display:none">
      <table><thead><tr><th style="width:108px">Date</th><th style="width:50px">#</th><th>Notes</th></tr></thead>
      <tbody id="tb"></tbody></table>
    </div>
    <div class="hint" id="hint">Select at least one day to generate the schedule.</div>
  </div>
</div>

<script>
const TAGS={AD:"Last day to add/drop",INC:"Incompletes convert",AE:"Session A ends",BB:"Session B begins",AW:"Last day to withdraw (Session A)",BW:"Last day to withdraw (Session B)",W:"Last day to withdraw (full semester)"};
const TC={AD:"ad",INC:"inc",W:"w"};
const DA=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MA=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

let cal={}, halfdays={}, sel=new Set(), sem="", wt="before";

// --- CSV parsing ---
function parseCSV(text){
  cal={}; halfdays={};
  const lines=text.split(/\r?\n/);
  let block=null;
  for(const raw of lines){
    const line=raw.trim();
    if(!line)continue;
    if(line.startsWith("#")){
      block=line.replace(/^#\s*/,"").trim();
      cal[block]=[];
      continue;
    }
    if(!block)continue;
    // skip header rows
    if(line.toLowerCase().startsWith("date,"))continue;
    const cols=line.split(",");
    if(cols.length<2)continue;
    const [date,instrRaw,monSched,tags,desc]=cols;
    if(!/^\d{4}-\d{2}-\d{2}$/.test(date.trim()))continue;
    const instr=parseFloat(instrRaw);
    const row={date:date.trim(),instr,monSched:(monSched||"").trim(),tags:(tags||"").trim(),desc:(cols.slice(4).join(",")).trim()};
    cal[block].push(row);
    if(instr===0.5) halfdays[block]=halfdays[block]||[];
    if(instr===0.5)(halfdays[block]=halfdays[block]||[]).push(row.date);
  }
  return Object.keys(cal).length>0;
}

function populateSemSelect(){
  const el=document.getElementById("sem");
  el.innerHTML=Object.keys(cal).map(k=>`<option value="${k}">${k}</option>`).join("");
  sem=el.value;
}

// --- File handling ---
function handleFile(file){
  if(!file||!file.name.endsWith(".csv")){setErr("Please upload a .csv file.");return;}
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      if(!parseCSV(e.target.result)||Object.keys(cal).length===0){setErr("Could not parse calendar. Check the CSV format.");return;}
      setErr("");
      document.getElementById("uploadLabel").textContent="✓ "+file.name;
      document.getElementById("main").style.display="";
      sel.clear();
      document.querySelectorAll(".day-btn").forEach(b=>b.classList.remove("on"));
      populateSemSelect();
      render();
    }catch(ex){setErr("Error reading file: "+ex.message);}
  };
  reader.readAsText(file);
}

function setErr(msg){document.getElementById("err").textContent=msg;}

const dz=document.getElementById("dropzone");
document.getElementById("fileIn").addEventListener("change",e=>handleFile(e.target.files[0]));
dz.addEventListener("dragover",e=>{e.preventDefault();dz.classList.add("over");});
dz.addEventListener("dragleave",()=>dz.classList.remove("over"));
dz.addEventListener("drop",e=>{e.preventDefault();dz.classList.remove("over");handleFile(e.dataTransfer.files[0]);});

// --- Day toggles ---
document.querySelectorAll(".day-btn").forEach(b=>b.addEventListener("click",()=>{
  const d=+b.dataset.d;
  sel.has(d)?sel.delete(d):sel.add(d);
  b.classList.toggle("on",sel.has(d));
  render();
}));
document.getElementById("sem").addEventListener("change",e=>{sem=e.target.value;render();});

function setT(t){
  wt=t;
  document.getElementById("tBefore").classList.toggle("on",t==="before");
  document.getElementById("tAfter").classList.toggle("on",t==="after");
  render();
}

// --- Date helpers ---
function dow(s){const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d).getDay();}
function fmt(s){const[y,m,d]=s.split("-").map(Number);const dt=new Date(y,m-1,d);return DA[dt.getDay()]+" "+MA[m-1]+" "+d;}

// Effective instruction: half-days with Wed selected flip based on wt
function effI(row){
  if(row.instr===0.5&&sel.has(3)){return wt==="before"?1:0;}
  return row.instr;
}

// --- Half-day prompt ---
function updateWedPrompt(){
  const hd=halfdays[sem];
  const show=sel.has(3)&&hd&&hd.length>0;
  const el=document.getElementById("wed");
  el.style.display=show?"flex":"none";
  if(show){
    const dates=hd.map(fmt).join(", ");
    document.getElementById("wedMsg").textContent=
      (hd.length===1?dates+" is a half-day":"The following are half-days: "+dates)+
      " (instruction ends at 12:30). Does this class meet…";
  }
}

// --- Build rows ---
const ALWAYS_TAGS=["AE","W"];
function getRows(){
  if(!sel.size||!cal[sem])return null;
  const hasMon=sel.has(1);
  let n=0, out=[];
  for(const r of cal[sem]){
    const d=dow(r.date), isM=r.monSched==="Monday";
    const tags=r.tags?r.tags.split(";").filter(Boolean):[];
    const isMeetingDay=sel.has(d)||(hasMon&&isM);
    const isAlways=tags.some(t=>ALWAYS_TAGS.includes(t));
    if(!isMeetingDay&&!isAlways)continue;
    const ei=isMeetingDay?effI(r):0, has=ei>0;
    if(has)n++;
    const notes=[];
    if(r.instr===0.5&&sel.has(3)&&isMeetingDay){
      notes.push(wt==="before"?"Half-day (class meets)":"Half-day — no instruction after 12:30");
    } else if(r.desc){notes.push(r.desc);}
    if(isM)notes.push("Runs as Monday schedule");
    tags.forEach(t=>{if(TAGS[t])notes.push(TAGS[t]);});
    out.push({s:r.date,tags:r.tags,isM,has,isMeetingDay,n:has?n:null,notes});
  }
  return out;
}

// --- Render ---
function render(){
  if(!sem)return;
  updateWedPrompt();
  const data=getRows();
  document.getElementById("wrap").style.display=data&&sel.size?"":"none";
  document.getElementById("hint").style.display=(!data||!sel.size)?"":"none";
  if(!data||!sel.size){
    ["sTotal","sSess","sMiss"].forEach(id=>document.getElementById(id).textContent="—");
    return;
  }
  document.getElementById("sTotal").textContent=data.length;
  document.getElementById("sSess").textContent=data.filter(r=>r.has).length;
  document.getElementById("sMiss").textContent=data.filter(r=>!r.has).length;
  document.getElementById("tb").innerHTML=data.map(r=>{
    let note=r.notes.join(" · ");
    if(r.tags)r.tags.split(";").filter(Boolean).forEach(t=>note+=` <span class="pill ${TC[t]||''}">${t}</span>`);
    const cls=r.has?(r.isM?"mon":""):"off";
    return`<tr class="${cls}"><td>${fmt(r.s)}</td><td>${r.n??""}</td><td class="n">${note}</td></tr>`;
  }).join("");
}

// --- Download ---
function dl(){
  const data=getRows();if(!data||!sel.size)return;
  const days=[...sel].sort().map(d=>["","Mon","Tue","Wed","Thu","Fri"][d]).join("/");
  const lines=[`"${sem} — ${days}"`,'"Date","Session #","Notes"'];
  data.forEach(r=>{
    const note=r.notes.join("; ")+(r.tags?` [${r.tags}]`:"");
    lines.push(`"${fmt(r.s)}","${r.n??''}","${note.replace(/"/g,'""')}"`);
  });
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([lines.join("\n")],{type:"text/csv"}));
  a.download=`schedule_${sem.replace(/\s+/g,"_")}_${days.replace(/\//g,"")}.csv`;
  a.click();
}
</script>
</body>
</html>
